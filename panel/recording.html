<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Ortoni Studio - Video Recorder</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        margin: 0;
        padding: 0;
        background-color: #080a10;
        color: #f1f5f9;
        font-family:
          "Outfit",
          "Inter",
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          sans-serif;
        overflow: hidden;
      }
      @keyframes pulse {
        0% {
          opacity: 0.4;
          transform: scale(0.95);
        }
        50% {
          opacity: 1;
          transform: scale(1.05);
        }
        100% {
          opacity: 0.4;
          transform: scale(0.95);
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./recording.tsx"></script>
  </body>
</html>
